repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect secrets
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        name: scan vulnerabilities
        entry: bandit
        args: ["-r", "samgria", "--skip", "B101,B311"]
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.2
    hooks:
      - id: ruff
        name: code style and formatting
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: type check
        language: system
        entry: bash
        args:
          - -c
          - pyright samgria/
        pass_filenames: false
      - id: pytest
        name: unit tests
        language: system
        entry: bash
        args:
          - -c
          - pytest -m unit --tb=short -q 2>/dev/null || echo "No unit tests found (yet)"
        pass_filenames: false
